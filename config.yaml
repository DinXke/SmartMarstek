name: SmartMarstek
version: "1.19.90"
slug: smartmarstek
description: Smart battery management dashboard for Marstek batteries with ENTSO-E price strategy, solar forecast and Home Assistant integration.
url: https://github.com/DinXke/SmartMarstek
arch:
  - aarch64
  - amd64

image: ghcr.io/dinxke/smartmarstek/{arch}

startup: application
boot: auto
init: false

# Allow the add-on to call the HA Core API via http://supervisor/core
homeassistant_api: true

map:
  - data:rw

ingress: true
ingress_port: 5000
panel_icon: mdi:battery-charging
panel_title: SmartMarstek

ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: SmartMarstek web interface

# ---------------------------------------------------------------------------
# Add-on configuration (shown in the HA add-on Configuration tab)
# Leave a field empty to keep managing it via the SmartMarstek web UI instead.
# Sensitive fields (token, keys, passwords) are masked with *** in the HA UI.
# ---------------------------------------------------------------------------
options:
  ha_url: ""
  ha_token: ""
  entsoe_api_key: ""
  entsoe_country: "BE"
  timezone: "Europe/Brussels"
  influx_use_ha_addon: false
  influx_url: ""
  influx_version: "v1"
  influx_username: ""
  influx_password: ""
  log_level: "info"

schema:
  ha_url: str
  ha_token: password
  entsoe_api_key: password
  entsoe_country: str
  timezone: str
  influx_use_ha_addon: bool
  influx_url: str
  influx_version: list(v1|v2)
  influx_username: str
  influx_password: password
  log_level: list(trace|debug|info|notice|warning|error|fatal)
