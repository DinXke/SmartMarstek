version: "3.8"

services:
  influxdb:
    image: influxdb:2.7
    container_name: marstek-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: marstek
      DOCKER_INFLUXDB_INIT_PASSWORD: marstek2024!
      DOCKER_INFLUXDB_INIT_ORG: marstek
      DOCKER_INFLUXDB_INIT_BUCKET: energy
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: marstek-influx-token-local
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

volumes:
  influxdb_data:
  influxdb_config:
